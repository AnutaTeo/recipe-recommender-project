<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Recommendations by Skill and Cuisine</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <meta charset="UTF-8">
</head>
<body>
<div class="container">
  <h1>Recommended Recipes by Skill and Preferred Cuisine</h1>

  <div class="top-links">
    <a href="/">Back to Home</a>
    <a href="/recipes">View All Recipes</a>
    <a href="/recipes/recommend/skill">Recommendations by Skill</a>
  </div>

  <p>
    First user skill level:
    <strong th:text="${userSkillLevel}"></strong>
  </p>

  <p>
    First user preferred cuisine:
    <strong th:text="${preferredCuisine}"></strong>
  </p>

  <div th:if="${#lists.isEmpty(recipes)}">
    <p>No recipes found matching both skill level and preferred cuisine.</p>
  </div>

  <div th:each="recipe : ${recipes}" class="recipe-card">
    <h2 th:text="${recipe.title}"></h2>

    <p><strong>ID:</strong> <span th:text="${recipe.id}"></span></p>

    <p><strong>Cuisine Types:</strong></p>
    <ul>
      <li th:each="cuisine : ${recipe.cuisineTypes}" th:text="${cuisine}"></li>
    </ul>

    <p>
      <strong>Difficulty Level:</strong>
      <span th:text="${recipe.difficultyLevel}"></span>
    </p>
  </div>
</div>
</body>
</html>
