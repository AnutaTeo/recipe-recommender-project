<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recipe Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">

    <div class="page-header">
        <h1>Recipe Details</h1>
        <p>View the complete information stored for the selected recipe.</p>
    </div>

    <div class="top-links">
        <a href="/">Back to Home</a>
        <a href="/recipes">Back to Recipes</a>
    </div>

    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>
    </div>

    <div th:if="${recipe != null}" class="recipe-card">
        <h2 th:text="${recipe.title}"></h2>

        <div class="recipe-meta">
            <span class="badge">ID: <span th:text="${recipe.id}"></span></span>
            <span class="badge" th:text="${recipe.difficultyLevel}"></span>
        </div>

        <p><strong>Cuisine Types:</strong></p>
        <ul>
            <li th:each="cuisine : ${recipe.cuisineTypes}" th:text="${cuisine}"></li>
        </ul>
    </div>

</div>
</body>
</html>
